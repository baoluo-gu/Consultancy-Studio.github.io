<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>东南亚造价咨询</title>
<style>
body{font-family:Arial;margin:0;background:#fff;color:#333}
.header{background:#f5f5f5;padding:20px;text-align:center}
.content{max-width:1000px;margin:0 auto;padding:20px}
.section{margin:40px 0}
.card{background:#fff;padding:20px;margin:10px;border-radius:10px;box-shadow:0 2px 5px rgba(0,0,0,0.1)}
button{padding:8px 12px;margin:5px;background:#007bff;color:white;border:none;border-radius:5px}
</style>
</head>
<body>

<div class="header">
    <h1>东南亚造价咨询服务</h1>
    <button onclick="showZh()">中文</button>
    <button onclick="showEn()">English</button>
</div>

<div class="content">
    <div class="section">
        <div id="text1">
            <h2>关于我们</h1>
            <p>我们专注东南亚造价咨询、合约管控、项目风险管理。</p>
        </div>
    </div>

    <div class="section">
        <div class="card">造价咨询</div>
        <div class="card">合约管理</div>
        <div class="card">本地化服务</div>
    </div>

    <div class="section">
        <h2 id="text2">联系我们</h2>
        <p>邮箱：contact@example.com</p>
    </div>
</div>

<script>
var text1 = document.getElementById('text1');
var text2 = document.getElementById('text2');

function showZh() {
    text1.innerHTML = '<h2>关于我们</h2><p>我们专注东南亚造价咨询、合约管控、项目风险管理。</p>';
    text2.innerHTML = '联系我们';
}

function showEn() {
    text1.innerHTML = '<h2>About Us</h2><p>We provide cost consulting and contract management in Southeast Asia.</p>';
    text2.innerHTML = 'Contact Us';
}
</script>

</body>
</html>
