<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>东南亚造价咨询</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-white m-0 p-0 font-sans">

<!-- 导航 -->
<div class="bg-white shadow p-4 flex justify-between items-center max-w-6xl mx-auto">
    <div class="text-lg font-bold text-blue-600">东南亚造价咨询</div>
    <div class="flex gap-2">
        <button onclick="show('zh')" class="px-3 py-1 bg-blue-600 text-white rounded">中文</button>
        <button onclick="show('en')" class="px-3 py-1 bg-gray-200 rounded">English</button>
        <button onclick="show('th')" class="px-3 py-1 bg-gray-200 rounded">ไทย</button>
        <button onclick="show('kh')" class="px-3 py-1 bg-gray-200 rounded">ខ្មែរ</button>
    </div>
</div>

<!-- 内容 -->
<div class="max-w-6xl mx-auto p-4">
    <!-- 关于我们 -->
    <div class="my-10 p-6 bg-gray-50 rounded-xl">
        <h2 class="text-2xl font-bold mb-4" id="about">关于我们</h2>
        <p id="about_text">我们专注东南亚造价咨询、合约管控、风险控制，服务一带一路项目。</p>
    </div>

    <!-- 服务 -->
    <div class="grid md:grid-cols-3 gap-4 mb-10">
        <div class="p-6 bg-white rounded-xl shadow">
            <i class="fas fa-calculator text-blue-600 text-2xl mb-2"></i>
            <h5 id="s1">造价咨询</h5>
        </div>
        <div class="p-6 bg-white rounded-xl shadow">
            <i class="fas fa-file-contract text-blue-600 text-2xl mb-2"></i>
            <h5 id="s2">合约管控</h5>
        </div>
        <div class="p-6 bg-white rounded-xl shadow">
            <i class="fas fa-globe-asia text-blue-600 text-2xl mb-2"></i>
            <h5 id="s3">本地化服务</h5>
        </div>
    </div>

    <!-- 图表 -->
    <div class="p-6 bg-white rounded-xl shadow mb-10">
        <h3 class="text-xl font-bold mb-4" id="market">市场数据</h3>
        <canvas id="chart" height="250"></canvas>
    </div>

    <!-- 联系 -->
    <div class="p-6 bg-gray-50 rounded-xl text-center mb-10">
        <h3 class="text-xl font-bold mb-2" id="contact">联系我们</h3>
        <p id="contact_text">邮箱：contact@example.com</p>
    </div>
</div>

<!-- 底部 -->
<div class="bg-gray-800 text-white p-4 text-center">
    <span id="footer">© 2026 东南亚造价咨询</span>
</div>

<script>
// 多语言
const lang = {
    zh: { about:"关于我们", about_text:"我们专注东南亚造价咨询、合约管控、风险控制，服务一带一路项目。", s1:"造价咨询", s2:"合约管控", s3:"本地化服务", market:"市场数据", contact:"联系我们", contact_text:"邮箱：contact@example.com", footer:"© 2026 东南亚造价咨询" },
    en: { about:"About Us", about_text:"We provide cost consulting, contract management in Southeast Asia.", s1:"Cost Consulting", s2:"Contract Management", s3:"Local Service", market:"Market Data", contact:"Contact Us", contact_text:"Email: contact@example.com", footer:"© 2026 SEA Cost Consulting" },
    th: { about:"เกี่ยวกับเรา", about_text:"เราให้บริการปรึกษาต้นทุนและจัดการสัญญา", s1:"ปรึกษาต้นทุน", s2:"จัดการสัญญา", s3:"บริการท้องถิ่น", market:"ข้อมูลตลาด", contact:"ติดต่อเรา", contact_text:"อีเมล: contact@example.com", footer:"© 2026 ปรึกษาต้นทุนอาเซียน" },
    kh: { about:"អំពីយើង", about_text:"យើងផ្តល់សេវាប្រឹក្សាតម្លៃនិងគ្រប់គ្រងកិច្ចសន្យា", s1:"ប្រឹក្សាតម្លៃ", s2:"គ្រប់គ្រងកិច្ចសន្យា", s3:"សេវាកម្មក្នុងស្រុក", market:"ទិន្នន័យទីផ្សារ", contact:"ទំនាក់ទំនងយើង", contact_text:"អ៊ីមែល: contact@example.com", footer:"© 2026 ការប្រឹក្សាតម្លៃអាស៊ីអាគ្នេយ៍" }
};
function show(l) {
    document.getElementById("about").innerText = lang[l].about;
    document.getElementById("about_text").innerText = lang[l].about_text;
    document.getElementById("s1").innerText = lang[l].s1;
    document.getElementById("s2").innerText = lang[l].s2;
    document.getElementById("s3").innerText = lang[l].s3;
    document.getElementById("market").innerText = lang[l].market;
    document.getElementById("contact").innerText = lang[l].contact;
    document.getElementById("contact_text").innerText = lang[l].contact_text;
    document.getElementById("footer").innerText = lang[l].footer;
}

// 图表
new Chart(document.getElementById("chart"),{
    type:"bar",
    data:{
        labels:["Thailand","Cambodia","Laos","Vietnam","Malaysia"],
        datasets:[{
            label:"Market Size (M$)",
            data:[34,15,6,22,18],
            backgroundColor:"#3b82f6"
        }]
    }
});
</script>
</body>
</html>
